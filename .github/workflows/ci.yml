name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff (lint check)
        run: ruff check .

      - name: Run ruff (format check)
        run: ruff format --check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r producer/requirements.txt
          pip install -r consumer/requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest

  build:
    name: Build (docker)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: docker compose config > /dev/null

      - name: Build producer image
        run: docker build -t crypto-producer:ci ./producer

      - name: Build consumer image
        run: docker build -t crypto-consumer:ci ./consumer

  deploy:
    name: Deploy to Oracle VM
    needs: [lint, test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to VM
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'DEPLOY_EOF'
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            echo "=== Pulling latest code ==="
            git pull origin main
            echo "=== Rebuilding and restarting containers ==="
            docker compose up -d --build
            echo "=== Container status ==="
            docker compose ps
            echo "=== Deploy complete ==="
          DEPLOY_EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
